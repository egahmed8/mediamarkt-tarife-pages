<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaMarkt Tarife CSV</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <h1>MediaMarkt Tarife</h1>
    <p class="hint">CSV aus dem Repo anzeigen und bei Bedarf mit einem Fetch bewusst ueberschreiben.</p>

    <section class="toolbar">
      <button id="reloadCsvBtn" type="button">CSV neu laden</button>
      <label class="confirm-row" for="allowOverwrite">
        <input id="allowOverwrite" type="checkbox" />
        Ueberschreiben aktivieren
      </label>
      <button id="fetchOverwriteBtn" type="button" disabled>Fetch + Ueberschreiben</button>
      <a id="downloadBtn" class="download" href="#" download="tarife.csv">Aktuelle Ansicht als CSV speichern</a>
    </section>

    <p id="status" class="status">Lade CSV...</p>

    <div class="table-wrap">
      <table id="csvTable">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
